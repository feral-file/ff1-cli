# On release publish: run build workflow, then upload artifacts to the existing release.
name: Release

on:
  release:
    types: [published]

jobs:
  ci:
    if: github.event_name == 'release'
    uses: ./.github/workflows/ci.yml

  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify package version matches tag
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG_VERSION="${{ github.event.release.tag_name }}"
          else
            TAG_VERSION="${{ github.ref_name }}"
          fi

          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: package.json is $PACKAGE_VERSION but tag is $TAG_VERSION."
            echo "Before cutting a release, set package.json version to the exact tag (example: tag 1.0.2 -> version 1.0.2)."
            exit 1
          fi

          echo "Version check passed: package.json and tag are both $PACKAGE_VERSION."

  build:
    needs:
      - ci
      - verify-version
    if: github.event_name == 'release'
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ github.event.release.tag_name }}
    secrets: inherit

  publish-npm:
    needs:
      - ci
      - verify-version
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm
        run: npm publish --access public

  upload-release-assets:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Flatten release files
        run: |
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.sha256' \) -exec cp {} . \;
          ls -la

      - name: Upload assets to release
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            *.tar.gz *.tar.gz.sha256 *.zip *.zip.sha256 \
            --clobber \
            --repo "${{ github.repository }}"
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_DIR: ${{ github.workspace }}/.git
          GIT_WORK_TREE: ${{ github.workspace }}

  verify-release:
    needs: [publish-npm, upload-release-assets]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Verify release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG="${{ github.event.release.tag_name }}"
          REQUIRED_ASSETS=(
            "ff1-cli-darwin-arm64.tar.gz"
            "ff1-cli-darwin-arm64.tar.gz.sha256"
            "ff1-cli-linux-x64.tar.gz"
            "ff1-cli-linux-x64.tar.gz.sha256"
            "ff1-cli-windows-x64.zip"
            "ff1-cli-windows-x64.zip.sha256"
          )

          RELEASE_ASSETS=$(gh release view "$TAG" --repo "${{ github.repository }}" --json assets --jq '.assets[].name')
          for asset in "${REQUIRED_ASSETS[@]}"; do
            if ! grep -qx "$asset" <<< "$RELEASE_ASSETS"; then
              echo "Missing release asset: $asset"
              echo "Release assets found:"
              echo "$RELEASE_ASSETS"
              exit 1
            fi
          done

      - name: Verify npm package version
        run: |
          set -euo pipefail

          TAG="${{ github.event.release.tag_name }}"
          ATTEMPTS=10
          SLEEP_SECONDS=10

          for attempt in $(seq 1 "$ATTEMPTS"); do
            NPM_VERSION=$(npm view ff1-cli version)
            if [ "$NPM_VERSION" = "$TAG" ]; then
              echo "npm version check passed: $NPM_VERSION"
              exit 0
            fi

            if [ "$attempt" -lt "$ATTEMPTS" ]; then
              echo "npm version is $NPM_VERSION, expected $TAG; retrying in ${SLEEP_SECONDS}s (${attempt}/${ATTEMPTS})"
              sleep "$SLEEP_SECONDS"
            fi
          done

          echo "npm version check failed: expected $TAG"
          exit 1
