name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 1.0.18-beta.0)"
        required: true
        type: string

jobs:
  ci:
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/ci.yml

  build:
    needs: [ci]
    if: github.event_name == 'release'
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ github.event.release.tag_name }}
    secrets: inherit

  publish-npm:
    needs: [ci]
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      GROK_API_KEY: release-ci
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - id: meta
        name: Resolve publish metadata
        run: |
          set -euo pipefail

          VERSION="${{ github.event_name == 'release' && github.event.release.tag_name || inputs.version }}"
          TAG="latest"

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="beta"
          elif [ "${{ github.event.release.prerelease }}" = "true" ]; then
            TAG="beta"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Verify package version matches tag
        if: github.event_name == 'release'
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.meta.outputs.version }}"

          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: package.json is $PACKAGE_VERSION but tag is $TAG_VERSION."
            echo "Before cutting a release, set package.json version to the exact tag (example: tag 1.0.2 -> version 1.0.2)."
            exit 1
          fi

          echo "Version check passed: package.json and tag are both $PACKAGE_VERSION."

      - name: Set package version
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          TARGET="${{ steps.meta.outputs.version }}"
          CURRENT="$(node -p "require('./package.json').version")"
          if [ "${CURRENT}" != "${TARGET}" ]; then
            npm version "${TARGET}" --no-git-tag-version
          else
            echo "package.json already at ${TARGET}; skipping npm version."
          fi

      - name: Publish to npm
        run: |
          if [ "${{ steps.meta.outputs.tag }}" = "beta" ]; then
            npm publish --tag beta --access public
          else
            npm publish --access public
          fi

  upload-release-assets:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Flatten release files
        run: |
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.sha256' \) -exec cp {} . \;
          ls -la

      - name: Upload assets to release
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            *.tar.gz *.tar.gz.sha256 *.zip *.zip.sha256 \
            --clobber \
            --repo "${{ github.repository }}"
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_DIR: ${{ github.workspace }}/.git
          GIT_WORK_TREE: ${{ github.workspace }}

  verify-release:
    needs: [publish-npm, upload-release-assets]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Verify release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG="${{ github.event.release.tag_name }}"
          REQUIRED_ASSETS=(
            "ff1-cli-darwin-arm64.tar.gz"
            "ff1-cli-darwin-arm64.tar.gz.sha256"
            "ff1-cli-linux-x64.tar.gz"
            "ff1-cli-linux-x64.tar.gz.sha256"
            "ff1-cli-windows-x64.zip"
            "ff1-cli-windows-x64.zip.sha256"
          )

          RELEASE_ASSETS=$(gh release view "$TAG" --repo "${{ github.repository }}" --json assets --jq '.assets[].name')
          for asset in "${REQUIRED_ASSETS[@]}"; do
            if ! grep -qx "$asset" <<< "$RELEASE_ASSETS"; then
              echo "Missing release asset: $asset"
              echo "Release assets found:"
              echo "$RELEASE_ASSETS"
              exit 1
            fi
          done
